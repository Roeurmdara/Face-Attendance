version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: attendance_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: attendance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Python FastAPI Backend
  python-api:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: face_recognition_api
    environment:
      FACE_RECOGNITION_THRESHOLD: "0.6"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./python:/app/python

  # Next.js Frontend (optional - usually run locally)
  # frontend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: attendance_frontend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgres@postgres:5432/attendance_db
  #     NEXT_PUBLIC_PYTHON_API_URL: http://python-api:8000
  #   depends_on:
  #     - postgres
  #     - python-api

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: attendance_network
